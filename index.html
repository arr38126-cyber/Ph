<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الفيزياء التعليمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a120b; color: #d4af37; font-family: sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-[#2d2013] rounded-2xl shadow-2xl border border-[#d4af37]/20 p-8 text-right">
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-[#3d2b1d] rounded-full mx-auto mb-4 border-2 border-[#d4af37] flex items-center justify-center shadow-lg text-4xl">Φ</div>
            <h1 class="text-2xl font-bold">بوابة الفيزياء التعليمية</h1>
            <p class="text-[#a68a64] mt-2 italic text-sm">التميز في العلم.. الفخامة في المعرفة</p>
        </div>
        <div class="space-y-6">
            <input type="text" placeholder="أدخل كود الطالب..." class="w-full bg-[#1a120b] border border-[#d4af37]/30 rounded-lg py-3 px-4 text-white focus:outline-none focus:border-[#d4af37]">
            <input type="password" placeholder="كلمة المرور" class="w-full bg-[#1a120b] border border-[#d4af37]/30 rounded-lg py-3 px-4 text-white focus:outline-none focus:border-[#d4af37]">
            <button class="w-full bg-gradient-to-r from-[#8b5e34] to-[#634832] text-white font-bold py-3 rounded-lg shadow-lg hover:brightness-110 transition-all">دخول للمنصة</button>
        </div>
    </div>
</body>
</html>
