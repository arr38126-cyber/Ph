<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الدكتور فادي عادل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* تعريف الألوان المخصصة من شعارك */
        :root {
            --brand-dark-navy: #1C2331; /* اللون الكحلي الداكن جداً من شعارك (الأسود الملكي) */
            --brand-orange: #F57C00;   /* اللون البرتقالي الجريء من شعارك */
            --brand-beige: #FFF8E1;    /* اللون البيج الفاتح من شعارك */
        }
        body { 
            background-color: var(--brand-beige); 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            padding: 0; 
        }
        .cairo { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-xl w-full bg-[#1C2331] rounded-3xl shadow-[0_25px_60px_rgba(0,0,0,0.6)] border border-[#F57C00]/20 p-12 text-right relative overflow-hidden">
        
        <div class="absolute -top-20 -left-20 w-80 h-80 bg-[#F57C00]/5 rounded-full filter blur-3xl"></div>
        <div class="absolute -bottom-20 -right-20 w-80 h-80 bg-[#F57C00]/5 rounded-full filter blur-3xl"></div>

        <div class="text-center mb-10 relative">
            <div class="w-32 h-32 mx-auto mb-6 flex items-center justify-center p-2 rounded-full bg-[#FFF8E1] border-4 border-[#F57C00] shadow-2xl">
                <img src="https://i.ibb.co/5F4XjF0/fady-logo.png" alt="FADY Logo" class="object-contain max-h-full">
            </div>
            
            <h1 class="text-4xl font-extrabold text-[#FFF8E1] cairo drop-shadow-lg tracking-tight">دكتور فادي عادل</h1>
            
            <div class="mt-4 px-6 py-2 bg-[#F57C00]/10 rounded-full inline-block border border-[#F57C00]/20 shadow-inner">
                <p class="text-[#FFF8E1]/90 cairo font-medium text-sm leading-relaxed italic tracking-wide">"من لا يهوى صعود الجبال يعش ابد الدهر بين الحفر"</p>
            </div>
        </div>

        <div class="space-y-6 relative">
            <div class="relative group">
                <input type="text" placeholder="أدخل كود الطالب..." 
                    class="w-full bg-[#293241] border-2 border-[#F57C00]/30 rounded-2xl py-5 px-6 text-[#FFF8E1] placeholder-[#FFF8E1]/50 cairo font-semibold focus:outline-none focus:border-[#F57C00] focus:ring-4 focus:ring-[#F57C00]/20 transition-all shadow-xl group-hover:border-[#F57C00]/70">
            </div>
            
            <div class="relative group">
                <input type="password" placeholder="كلمة المرور" 
                    class="w-full bg-[#293241] border-2 border-[#F57C00]/30 rounded-2xl py-5 px-6 text-[#FFF8E1] placeholder-[#FFF8E1]/50 cairo font-semibold focus:outline-none focus:border-[#F57C00] focus:ring-4 focus:ring-[#F57C00]/20 transition-all shadow-xl group-hover:border-[#F57C00]/70">
            </div>

            <button class="w-full bg-gradient-to-r from-[#F57C00] to-[#FF9800] text-[#1C2331] font-black cairo text-lg py-5 rounded-2xl shadow-[0_12px_25px_rgba(245,124,0,0.4)] hover:shadow-[0_15px_30px_rgba(245,124,0,0.6)] hover:-translate-y-1 active:scale-95 transition-all uppercase tracking-widest relative overflow-hidden">
                <span class="absolute top-0 left-0 w-full h-full bg-white opacity-10 rounded-2xl filter blur-sm"></span>
                دخول للمنصة
            </button>
            
            <div class="pt-6 border-t border-[#F57C00]/10 mt-6 text-center">
                <p class="text-[#FFF8E1]/70 cairo text-xs font-light tracking-wide">المنصة التعليمية الرسمية لطلاب د. فادي عادل</p>
                <p class="text-[#F57C00] cairo text-[10px] mt-1 font-bold">بوابة الفيزياء والكيمياء - التميز والابداع</p>
            </div>
        </div>
    </div>
</body>
</html>
